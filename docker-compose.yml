version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8080}

  backend-go:
    profiles: ["go"]
    build:
      context: ./go
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - db-go
    environment:
      - DB_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-go:5432/${POSTGRES_DB}

  db-go:
    profiles: ["go"]
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"

  backend-java:
    profiles: ["java"]
    build:
      context: ./java
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - db-java
    environment:
      - DB_URL=jdbc:postgresql://db-java:5432/${POSTGRES_DB}

  db-java:
    profiles: ["java"]
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"

  backend-python:
    profiles: ["python"]
    build:
      context: ./python
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - db-python
    environment:
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db-python:5432/${POSTGRES_DB}

  db-python:
    profiles: ["python"]
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5434:5432"
