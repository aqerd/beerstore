version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8080}

  backend-go:
    profiles: ["go"]
    build:
      context: ./go
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - db-go
    environment:
      - DB_URL=mysql://root:${DB_PASSWORD}@db-go:3306/golden_liquid

  db-go:
    profiles: ["go"]
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=golden_liquid
    ports:
      - "3306:3306"
    volumes:
      - ./database/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql

  backend-java:
    profiles: ["java"]
    build:
      context: ./java
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - db-java
    environment:
      - MONGO_URL=mongodb://db-java:27017/golden_liquid

  db-java:
    profiles: ["java"]
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro

  backend-python:
    profiles: ["python"]
    build:
      context: ./python
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      - db-python
    environment:
      - DB_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db-python:5432/${DB_NAME}

  db-python:
    profiles: ["python"]
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./database/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
